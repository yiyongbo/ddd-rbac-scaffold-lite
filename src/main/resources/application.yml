server:
  port: 8080

spring:
  application:
    name: ddd-rbac-scaffold-lite
  profiles:
    active: local
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

security:
  jwt:
    issuer: ddd-rbac-scaffold-lite
    secret: ${JWT_SECRET:please-change-this-secret-key}
    # 访问令牌过期时间（秒）: 7 天
    access-token-expire-seconds: 604800

auth:
  authorization-header: Authorization
  token-prefix: Bearer
  login-session-ttl: 2h
  login-user-session-index-ttl: 7d
  user-permission-cache-ttl: 30m

logging:
  file:
    path: ./logs