spring:
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ddd_rbac_scaffold_lite}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: RBAC_HikariCP
      minimum-idle: 2 # 最小空闲连接数量
      maximum-pool-size: 10 # 连接池最大连接数，默认是10
      idle-timeout: 300000 # 空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 1800000 # 此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      connection-timeout: 30000 # 数据库连接超时时间,默认30秒，即30000
      auto-commit: true  # 此属性控制从池返回的连接的默认自动提交行为,默认值：true
      connection-test-query: SELECT 1
      initialization-fail-timeout: 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 3s

app:
  async:
    biz:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 500
      keep-alive-seconds: 60
      thread-name-prefix: biz-executor-
      await-termination-seconds: 30
      wait-for-tasks-to-complete-on-shutdown: true
      # 任务拒绝策略：abort、discard、discard-oldest、caller-runs
      rejected-policy: caller-runs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: info
    io.github.yiyongbo.scaffold: debug
    org.springframework: info